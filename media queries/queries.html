<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent{
            height: 1000px;
            width: 1000px;
            background-color: crimson;
            display: flex;
            align-items: center;
            justify-content: space-evenly;
            flex-wrap: wrap;
            
        }
        .child1{
            height: 100px;
            width: 100px;
            background-color: blanchedalmond;
            border: 2px solid black;
            border-radius: 10px;
        }
        .child2{
            height: 100px;
            width: 100px;
            background-color: burlywood;
            border: 2px solid black;
            border-radius: 10px;
        }
        @media (max-width:600px) {
            .parent{background-color: cornflowerblue;}
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child1"></div>
        <div class="child2"></div>
    </div>
</body>
</html>
